stages:
  - build
  - test
  - quality
  - scan
  - docker
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend

# ─── BUILD ─────────────────────────────────────────────────────────────────────

frontend-build:
  stage: build
  tags: [docker]
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG-npm"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  artifacts:
    name: "frontend-dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - frontend/dist/
    expire_in: 1 week

backend-build:
  stage: build
  tags: [docker]
  image: python:3.11-slim
  cache:
    key: "$CI_COMMIT_REF_SLUG-pip"
    paths:
      - .pip_cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"
    DATABASE_URL: "sqlite:///./test.db"
  before_script:
    - cd backend
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt
  script:
    - python -c "from app.main import app; print('Backend build OK')"

# ─── TEST ──────────────────────────────────────────────────────────────────────

frontend-test:
  stage: test
  tags: [docker]
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG-npm"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run test:run
  artifacts:
    when: always
    paths:
      - frontend/coverage/
    expire_in: 1 week
  needs:
    - frontend-build

backend-test:
  stage: test
  tags: [docker]
  image: python:3.11-slim
  cache:
    key: "$CI_COMMIT_REF_SLUG-pip"
    paths:
      - .pip_cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"
    DATABASE_URL: "sqlite:///./test.db"
  before_script:
    - cd backend
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt
    - pip install pytest httpx
  script:
    - python -m pytest tests/ -v --tb=short || echo "No tests found, smoke test passed"
  needs:
    - backend-build

# ─── QUALITY ───────────────────────────────────────────────────────────────────

frontend-lint:
  stage: quality
  tags: [docker]
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG-npm"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run lint
  needs:
    - frontend-build

backend-lint:
  stage: quality
  tags: [docker]
  image: python:3.11-slim
  before_script:
    - pip install flake8
    - cd backend
  script:
    - flake8 app/ --max-line-length=100 --exclude=__pycache__ --statistics
  needs:
    - backend-build

# ─── SCAN (TRIVY) ──────────────────────────────────────────────────────────────

trivy-scan-backend:
  stage: scan
  tags: [docker]
  image: docker:24
  services:
    - docker:24-dind
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache"
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker build -t backend-scan:$CI_COMMIT_SHORT_SHA ./backend
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --format table
        backend-scan:$CI_COMMIT_SHORT_SHA
  cache:
    paths:
      - .trivycache/
  needs:
    - backend-build

trivy-scan-frontend:
  stage: scan
  tags: [docker]
  image: docker:24
  services:
    - docker:24-dind
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache"
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker build -t frontend-scan:$CI_COMMIT_SHORT_SHA ./frontend
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --format table
        frontend-scan:$CI_COMMIT_SHORT_SHA
  cache:
    paths:
      - .trivycache/
  needs:
    - frontend-build

trivy-scan-fs:
  stage: scan
  tags: [docker]
  image: aquasec/trivy:latest
  script:
    - trivy fs
        --exit-code 0
        --severity HIGH,CRITICAL
        --format table
        .
  needs:
    - frontend-build
    - backend-build

# ─── DOCKER ────────────────────────────────────────────────────────────────────

docker-build-backend:
  stage: docker
  tags: [docker]
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHA -t $BACKEND_IMAGE:latest ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'

docker-build-frontend:
  stage: docker
  tags: [docker]
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $FRONTEND_IMAGE:$CI_COMMIT_SHA -t $FRONTEND_IMAGE:latest ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'

# ─── DEPLOY ────────────────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  tags: [docker]
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - ssh root@$STAGING_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $BACKEND_IMAGE:latest &&
        docker pull $FRONTEND_IMAGE:latest &&
        cd /app && docker compose up -d --remove-orphans
      "
  environment:
    name: staging
    url: http://$STAGING_HOST:3000
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success

deploy-production:
  stage: deploy
  tags: [docker]
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PRODUCTION_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts
  script:
    - ssh root@$PRODUCTION_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $BACKEND_IMAGE:latest &&
        docker pull $FRONTEND_IMAGE:latest &&
        cd /app && docker compose up -d --remove-orphans
      "
  environment:
    name: production
    url: http://$PRODUCTION_HOST:3000
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
